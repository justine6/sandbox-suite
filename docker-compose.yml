services:
  database:
    image: postgres:15-alpine
    container_name: sandbox-suite-db
    environment:
      - POSTGRES_USER=jtl_admin
      - POSTGRES_PASSWORD=sandbox_pass
      - POSTGRES_DB=sandbox_db
    ports:
      - "55432:5432"
    volumes:
      - sandbox-suite_pgdata:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: sandbox-suite-redis
    ports:
      - "56379:6379"
    volumes:
      - sandbox-suite_redisdata:/data

volumes:
  sandbox-suite_pgdata:
  sandbox-suite_redisdata:

networks:
  default:
    name: sandbox-suite_network
